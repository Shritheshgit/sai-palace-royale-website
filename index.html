<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Palace Royale</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
color:#38bdf8;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.hero{
height:80vh;
background:url("https://images.unsplash.com/photo-1566073771259-6a8506099945") center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h2{
font-size:50px;
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

section{
padding:60px 10%;
}

.rooms{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.room{
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.room img{
width:100%;
}

.room h3{
padding:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.contact{
text-align:center;
}

footer{
background:#020617;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>Sai Palace Royale</h1>

<nav>
<a href="#rooms">Rooms</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

</header>

<div class="hero">
<h2>Welcome to Sai Palace Royale</h2>
</div>

<section id="rooms">

<h2>Our Rooms</h2>

<div class="rooms">

<div class="room">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
<h3>Deluxe Room</h3>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
<h3>Luxury Suite</h3>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4">
<h3>Family Room</h3>
</div>

</div>

</section>

<section id="gallery">

<h2>Hotel Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb">
<img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267">
<img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">

</div>

</section>

<section id="contact" class="contact">

<h2>Contact Us</h2>

<p>📍 Sai Palace Royale</p>
<p>📞 +91 9876543210</p>
<p>📧 saipalace@email.com</p>

</section>

<footer>

<p>© 2026 Sai Palace Royale</p>

</footer>

</body>
</html>
