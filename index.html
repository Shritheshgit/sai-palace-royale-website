<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
line-height:1.6;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#020617;
position:sticky;
top:0;
}

header h1{
color:#38bdf8;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
}

.hero{
height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
flex-direction:column;
}

.hero img{
width:180px;
border-radius:50%;
margin-bottom:20px;
animation: float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

section{
padding:80px 10%;
}

.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.contact form{
display:flex;
flex-direction:column;
max-width:500px;
}

input, textarea{
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
padding:12px;
border:none;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

footer{
text-align:center;
padding:20px;
background:#020617;
}

</style>
</head>

<body>

<header>
<h1>MyPortfolio</h1>

<nav>
<a href="#home">Home</a>
<a href="#portfolio">Portfolio</a>
<a href="#contact">Contact</a>
</nav>

</header>

<section class="hero" id="home">

<img src="https://i.pravatar.cc/200" alt="profile">

<h2>Hello, I'm a Web Developer</h2>
<p>I create modern websites and applications.</p>

</section>

<section id="portfolio">

<h2>My Work</h2>

<div class="portfolio">

<div class="card">
<img src="https://picsum.photos/400/300?1">
<h3>Project One</h3>
<p>Website design project</p>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?2">
<h3>Project Two</h3>
<p>UI/UX Design</p>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?3">
<h3>Project Three</h3>
<p>Web Application</p>
</div>

</div>

</section>

<section class="contact" id="contact">

<h2>Contact Me</h2>

<form>

<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>

<textarea rows="5" placeholder="Message"></textarea>

<button type="submit">Send Message</button>

</form>

</section>

<footer>

<p>© 2026 My Portfolio</p>

</footer>

</body>
</html>
