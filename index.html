<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sai Palace Royale</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#020617;
position:sticky;
top:0;
}

header h1{
color:#38bdf8;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
}

.hero{
height:90vh;
background:url("https://images.unsplash.com/photo-1566073771259-6a8506099945") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h2{
font-size:50px;
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:10px;
}

section{
padding:80px 10%;
}

.rooms{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.card h3{
padding:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.contact{
text-align:center;
}

button{
padding:12px 20px;
background:#38bdf8;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px 20px;
border-radius:50px;
color:white;
text-decoration:none;
}

footer{
text-align:center;
padding:20px;
background:#020617;
}

</style>

</head>

<body>

<header>

<h1>Sai Palace Royale</h1>

<nav>
<a href="#rooms">Rooms</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

</header>

<section class="hero">

<h2>Welcome to Sai Palace Royale</h2>

</section>

<section id="rooms">

<h2>Our Rooms</h2>

<div class="rooms">

<div class="card">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
<h3>Deluxe Room</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
<h3>Luxury Suite</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4">
<h3>Family Room</h3>
</div>

</div>

</section>

<section id="gallery">

<h2>Hotel Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb">
<img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267">
<img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">

</div>

</section>

<section id="contact" class="contact">

<h2>Contact Us</h2>

<p>📍 Sai Palace Royale, India</p>
<p>📞 +91 98765 43210</p>

<br>

<button>Reserve Your Table</button>

</section>

<a class="whatsapp" href="https://wa.me/919876543210">WhatsApp</a>

<footer>

<p>© 2026 Sai Palace Royale</p>

</footer>

</body>
</html>
